name: Bioenergy.org Quality Control

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3.0.2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                node-version: 22

            - name: Install package
              run: npm install --save ./api/

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint .

    api-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: api

        steps:
            - uses: actions/checkout@v3.0.2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                node-version: 22

            - name: Install dependencies
              run: npm install

            - name: Run API tests with coverage
              run: npx vitest run --coverage

    client-tests:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: client

        steps:
            - uses: actions/checkout@v3.0.2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                node-version: 22

            - name: Install dependencies
              run: npm install

            - name: Run client tests
              run: npx vitest run
